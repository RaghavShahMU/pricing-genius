name: Daily Pricing Extraction

on:
  #schedule:
    # 12:00 AM IST = 6:30 PM UTC (previous day)
    #- cron: '30 18 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          playwright install chromium --with-deps

      - name: Create screenshots directory
        run: mkdir -p data/screenshots

      - name: Run extraction (hybrid pipeline)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/extract_all.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/*.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/screenshots/*_latest.png
          git commit -m "chore: update competitor pricing data ($(date -u +%Y-%m-%d))"
          git push

      - name: Upload screenshots as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pricing-screenshots-${{ github.run_number }}
          path: data/screenshots/*_latest.png
          retention-days: 30

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pricing extraction failed - ${new Date().toISOString().split('T')[0]}`,
              body: `The daily pricing extraction workflow failed.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nScreenshots are available as build artifacts.`,
              labels: ['extraction-failure']
            });
